services:
  postgres:
    image: postgres:16
    container_name: sync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sync_service}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - sync-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sync_service}"]
      interval: 5s
      timeout: 5s
      retries: 20

  sync-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sync-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_ENGINE: postgresql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-sync_service}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      STORAGE_PATH: /app/storage
    ports:
      - "8000:8000"
    volumes:
      - sync-storage:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  sync-postgres-data:
  sync-storage:
